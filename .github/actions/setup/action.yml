name: Setup
description: Setup Node.js and install dependencies (Yarn 4 with built-in cache)

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable
      shell: bash
